server:
  port: 8080
  mode: debug
  ws_allowed_origins: ["*"]
  # Slow-loris / payload-drag protection. ReadHeaderTimeout is hard-coded
  # at 10s in main; these are application-level guards.
  read_timeout: "30s"
  # WriteTimeout intentionally omitted: setting it kills SSE / WebSocket
  # streams. Set explicitly only if you want a global write deadline.
  # write_timeout: "0s"
  idle_timeout: "120s"
db:
  dsn: "postgres://app:app@localhost:5432/app?sslmode=disable"
redis:
  addr: "localhost:6379"
auth:
  jwt_secret: "change-me-in-production"
  jwt_ttl: "24h"
  # Local email/password login. Set false in production when using OIDC only.
  local_enabled: true
  oidc:
    enabled: false
    issuer: ""
    client_id: ""
    # Name of env var holding the OIDC client secret (not the secret itself).
    client_secret_env: "OIDC_CLIENT_SECRET"
    redirect_url: "http://localhost:8080/auth/oidc/callback"
    tenant_slug: "default"
telemetry:
  service_name: "private-coding-agent"
  otlp_endpoint: ""
observability:
  log_format: "json"        # "json" | "text"
  log_level: "info"         # "debug" | "info" | "warn" | "error"
  # Static bearer token for Prometheus scraping /metrics. Leave empty to
  # require admin JWT for every scrape. Override per env via
  # PCA_OBSERVABILITY_METRICS_TOKEN.
  metrics_token: ""
skills:
  # Toggle the Agent Skills subsystem. When false the engine builds the
  # system prompt from the profile alone (pre-slice-12 byte-equal behaviour).
  enabled: true
  # Directories scanned recursively for SKILL.md files. Relative paths are
  # resolved against the server's working directory.
  dirs: ["skills"]
  # IDs auto-injected when neither the run nor the session nor the profile
  # picks one. Leave empty for "off by default".
  default_skill_ids: []
  # Per-run hard caps. Defaults applied in code: 24000 chars, 5 skills.
  max_injected_chars: 24000
  max_skills_per_run: 5
  # Reserved for a future fs-watch-based hot reload. No-op today.
  hot_reload: false
providers:
  # When a tenant has no enabled row for the requested provider name,
  # the registry falls back to the platform-global row (tenant_id IS NULL).
  # Set true to refuse the fallback — requires explicit per-tenant rows
  # and is the hardening posture for multi-tenant production.
  disallow_global_fallback: false

quota:
  # Per (tenant, user) caps. 0 disables the check entirely.
  # LLM tokens are summed across chat + embeddings, reset at UTC midnight.
  llm_tokens_per_day: 0        # 0 = 关闭 LLM token 日配额检查；生产建议 200000+
  # Active sandboxes per tenant (pending / running / destroying). DB-counted
  # at the create handler — independent of the Redis counters above.
  sandbox_max_active: 5
  # HTTP-level tool.invoke per (tenant, user) per minute.
  tool_invoke_per_minute: 120

rate_limit:
  # Global HTTP requests per (tenant, user) per minute applied to the
  # /protected group (skips /auth/*, /metrics). 0 disables.
  per_minute: 600

memory:
  # provider:model for memory embeddings (1536-d via dimensions param).
  # Compose with DASHSCOPE_API_KEY: dashscope:text-embedding-v4
  # Offline / E2E: default-mock:text
  embedding_model: "default-mock:text"
  # cosine-similarity cut-off above which Create deduplicates against an
  # existing memory (touches last_used_at, returns existing id). 0 disables.
  dedup_threshold: 0.92
  # Operational kill switch: false makes Create skip embedding entirely
  # and Search always falls back to keyword (slice-7 behaviour).
  embed_on_write: true
  # Slice 16: auto-inject on first user message in a session.
  inject_top_k: 5
  inject_max_chars: 4000

reflection:
  # Slice 20: Reflection Agent extracts memory candidates from archived sessions
  # via an async worker pool. enabled=false skips worker construction and admin
  # routes entirely.
  enabled: true
  # Model used by Reflector. For E2E / offline use default-mock:gpt-4o; in
  # production prefer dashscope:qwen3.6-plus or similar.
  model: "default-mock:gpt-4o"
  # Confidence >= threshold → auto-create the memory (subject to vector dedup).
  # 0 disables auto-approve (all proposals land in admin queue).
  auto_approve_threshold: 0.85
  # Truncation knobs for the LLM context. Cap is per-session.
  max_messages_per_session: 20
  max_chars_per_message: 500
  # Worker buffered-channel size; on overflow, Enqueue logs warn and drops.
  worker_buffer: 256
  # Per-job timeout (LLM call + persist).
  worker_timeout: 5m
  # Durable queue (pilot tech-debt #15): persisted in reflection_jobs; survives restart.
  max_attempts: 3
  retry_base_interval: 1m
  poll_interval: 30s
  # Reject pending admin proposals older than this many days.
  proposal_pending_ttl_days: 30

workflow:
  # Purge workflow_runs older than N days (0 disables). Runs once at boot + daily.
  runs_retention_days: 90
  retention_interval: 24h
  # Slice 24: cron scheduler tick + webhook rate cap (per token, per minute).
  trigger_poll_interval: 30s
  trigger_max_due_per_tick: 32
  trigger_webhook_rate_per_minute: 60

orchestrator:
  # Slice 21a: pre-Run routing pass. Inspects the latest user message and
  # may inject a "routing hint" system message before the LLM sees the prompt.
  # ReAct still decides whether to act on the hint — this is shadow + hint,
  # not a hard router. enabled=false skips engine construction entirely.
  enabled: true
  # When true, hint text is appended as a system message between skills and
  # the user history. When false, the engine still computes the Decision and
  # emits audit + metric, but no hint reaches the LLM (pure-shadow mode for
  # production rollout / A-B comparison).
  inject_hint: true
  # If non-empty AND no rule matched, this hint is injected as if a synthetic
  # rule named "default" had fired. Leave empty to skip on no_match.
  default_hint: ""
  rules:
    - name: e2e-orchestrator-marker
      match:
        content_contains: "E2E_ORCHESTRATOR_HINT_V1"
      suggest:
        type: tool
        target: fs.list
        hint: "ORCHESTRATOR_E2E_HINT_DELIVERED: E2E orchestrator router fired."
    - name: nl-workflow-author
      match:
        profile: ["coding", "workflow-authoring"]
        content_regex: "(?i)(工作流|自动化|定时|每周|webhook|流程编排|workflow\\.propose)"
      suggest:
        type: sub_agent
        target: workflow-authoring
        hint: |
          Routing hint: user may want a reusable workflow. Prefer workflow.propose
          (template_id + slots or user_message) for common patterns; use
          workflow.create only for custom DSL. Admin publishes via confirm — not workflow.publish from member runs.
    - name: e2e-nl-workflow-author
      match:
        content_contains: "E2E_NL_WF_AUTHOR_V1"
      suggest:
        type: sub_agent
        target: workflow-authoring
        hint: "ORCHESTRATOR_NL_WF_HINT_DELIVERED: NL workflow authoring hint injected."
    # Production examples — uncomment / extend as needed.
    # - name: code-review-suggest
    #   match:
    #     profile: ["coding"]
    #     content_regex: "(?i)code review|审查|review this"
    #   suggest:
    #     type: workflow
    #     target: code-review
    #     hint: |
    #       Routing hint: this looks like a code review task. Consider
    #       invoking workflow.code-review if published, or delegate to
    #       agent.delegate(profile="review", ...).
    # - name: research-route
    #   match:
    #     profile: ["coding"]
    #     content_regex: "(?i)research|gather (info|sources)"
    #   suggest:
    #     type: sub_agent
    #     target: research
    #     hint: "Routing hint: research-heavy task — agent.delegate(profile=\"research\", task=...) may help."

mcp:
  # Slice 21b: External MCP Manager. When true, admins can register HTTP MCP
  # servers via /admin/mcp-servers and their tools appear on the Bus as
  # `mcp.<slug>.<tool>`. enabled=false skips manager construction; the admin
  # endpoint returns 503 so the WebUI can distinguish "off" from "broken".
  enabled: true
  # Liveness pings interval. 0 disables the heartbeat goroutine but boot
  # republish still runs from tools_cache.
  heartbeat_interval: 60s
  # Per tools/call HTTP timeout.
  invoke_timeout: 30s
  # Per initialize + tools/list HTTP timeout. Used by RegisterServer,
  # RefreshTools, TestConnection, and each heartbeat tick.
  list_tools_timeout: 10s

sandbox:
  # Slice 22d1: Runtime driver.
  #   - "docker" (default): local Docker daemon, one container per sandbox.
  #     Requires DOCKER_HOST / /var/run/docker.sock reachable from this binary.
  #   - "k8s": one Pod per sandbox. See sandbox.k8s.* below. Snapshot is
  #     disabled in this mode (admin /snapshot routes return 503).
  driver: "docker"

  # K8s driver options. Only read when driver=="k8s".
  k8s:
    # Namespace where sandbox Pods are created. The deploy chart owns its
    # lifecycle; this binary does NOT auto-create it.
    namespace: "pca-sandboxes"
    # true → build the clientset from rest.InClusterConfig (the recommended
    # posture inside a Kubernetes deployment). false → use kubeconfig
    # (dev/debug). Override with PCA_SANDBOX_K8S_IN_CLUSTER.
    in_cluster: false
    # Path to kubeconfig when in_cluster=false. Empty defers to $KUBECONFIG
    # then $HOME/.kube/config.
    kubeconfig: ""
    # Pod ServiceAccount. Empty (default) makes the Pod run with
    # automountServiceAccountToken=false — the recommended posture; only
    # set when the workload genuinely needs an in-cluster SA.
    service_account: ""
    # Relative path under kubelet's /var/lib/kubelet/seccomp/ for the
    # hardened profile. Empty → RuntimeDefault. Non-empty → Localhost type
    # (operator must have staged the profile to every node).
    seccomp_localhost_profile: ""
    # Cap on Create wait for phase=Running. Default 60s covers cold image
    # pulls; tune down for hot caches.
    pod_ready_timeout_sec: 60

  # Slice 22c: applies an embedded hardened seccomp profile to every sandbox
  # container in addition to CapDrop ALL + no-new-privileges. Profile denies
  # mount/ptrace/keyctl/bpf/userfaultfd/perf_event_open etc. Set false only
  # to chase a kernel-too-old / toolchain regression — production should
  # leave true.
  seccomp_enabled: true

snapshot:
  # Slice 22b: Sandbox→S3 snapshot. When enabled, POST
  # /sandbox/sessions/:id/snapshot commits the running container, exports it
  # via `docker save`, and streams the tar to MinIO. Snapshots survive
  # sandbox destruction (session_id is set NULL on cascade). enabled=false
  # makes the three snapshot routes return 503 snapshot_disabled.
  enabled: false
  # MinIO / S3 host:port (no scheme). use_ssl picks http vs https.
  endpoint: "minio:9000"
  bucket: "pca-snapshots"
  access_key: "minioadmin"
  secret_key: "minioadmin"
  region: "us-east-1"
  use_ssl: false
  # Optional prefix prepended to every object key — useful when several
  # deployments share a single bucket.
  prefix: ""
  # When true, the committed image tag is kept on the sandbox host after
  # upload (debugging only — accumulates disk).
  keep_local_image: false

# Slice 25 — server-side connectors (agent 无需沙箱出网)
connectors:
  http_fetch:
    enabled: false
    # Host allowlist; supports exact host or "*.example.com". Empty = deny all.
    allow_hosts: []
    timeout_sec: 30
    max_body_bytes: 524288
    # SSRF guard: reject hosts resolving to private/loopback IPs (recommended prod).
    block_private_ips: true
