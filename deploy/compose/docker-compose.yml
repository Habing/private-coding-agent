services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER}"]
      interval: 3s
      timeout: 3s
      retries: 20
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes", "--appendfsync", "everysec"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 20
    ports:
      - "6379:6379"

  # 预 build pca/sandbox:base 镜像 (server depend 起来前必须可用)
  sandbox-image-builder:
    image: docker:cli
    command: ["sh", "-c", "docker build -t pca/sandbox:base /sandbox-context || true; sleep infinity"]
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ../../sandbox/image:/sandbox-context:ro
    profiles: ["build-only"]

  mock-oidc:
    build:
      context: ../..
      dockerfile: internal/auth/mockoidc/Dockerfile
    environment:
      MOCK_OIDC_ISSUER: http://mock-oidc:8082
      MOCK_OIDC_PUBLIC_URL: http://localhost:8082
      MOCK_OIDC_CLIENT_ID: pca-e2e
      MOCK_OIDC_CLIENT_SECRET: e2e-oidc-secret-change-me
      MOCK_OIDC_PORT: "8082"
    ports:
      - "8082:8082"

  mock-provider:
    build:
      context: ../..
      dockerfile: internal/modelgw/mockserver/Dockerfile
    healthcheck:
      disable: true
    ports:
      - "8081:8081"

  # Slice 21b: minimal HTTP MCP server exposing an `echo` tool. The E2E
  # script (step 63) registers this as an admin-managed mcp_servers row and
  # round-trips an invoke through Bus → mcpTool → JSON-RPC.
  mock-mcp:
    build:
      context: ../..
      dockerfile: internal/mcp/mockserver/Dockerfile
    environment:
      MOCK_MCP_PORT: "8083"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8083/healthz || exit 1"]
      interval: 3s
      timeout: 3s
      retries: 20
    ports:
      - "8083:8083"

  # Slice 22b — MinIO object storage for sandbox snapshots. Pinned tag avoids
  # the rolling :latest surprise; the named volume keeps data across compose
  # recreate. Healthcheck uses MinIO's documented /minio/health/ready probe.
  minio:
    image: minio/minio:RELEASE.2025-04-08T15-41-24Z
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    healthcheck:
      test: ["CMD-SHELL", "mc alias set local http://127.0.0.1:9000 \"$$MINIO_ROOT_USER\" \"$$MINIO_ROOT_PASSWORD\" >/dev/null 2>&1 && mc ready local || curl -fsS http://127.0.0.1:9000/minio/health/ready || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 30
    ports:
      - "9000:9000"  # S3 API
      - "9001:9001"  # console
    volumes:
      - miniodata:/data

  jaeger:
    image: jaegertracing/all-in-one:1.55
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"  # UI
      - "4317:4317"    # OTLP gRPC

  prometheus:
    # Bake prometheus.yml into a derived image instead of using a bind mount —
    # Docker Desktop for Windows occasionally fails to share F:\ paths
    # ("mkdir /run/desktop/mnt/host/f: file exists"), which blocks compose-up.
    # The image is rebuilt automatically when prometheus.yml changes.
    build:
      context: .
      dockerfile: prometheus.Dockerfile
    image: pca/prometheus:dev
    ports:
      - "9090:9090"
    depends_on:
      - server

  server:
    build:
      context: ../..
      dockerfile: Dockerfile
    user: "0:0"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mock-oidc:
        condition: service_started
      mock-mcp:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      PCA_DB_DSN: "postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable"
      PCA_REDIS_ADDR: "redis:6379"
      PCA_SERVER_PORT: 8080
      PCA_SERVER_MODE: release
      PCA_AUTH_JWT_SECRET: ${PCA_AUTH_JWT_SECRET}
      PCA_AUTH_JWT_TTL: 24h
      PCA_TELEMETRY_SERVICE_NAME: private-coding-agent
      PCA_TELEMETRY_OTLP_ENDPOINT: ${PCA_TELEMETRY_OTLP_ENDPOINT}
      PCA_OBSERVABILITY_METRICS_TOKEN: ${PCA_OBSERVABILITY_METRICS_TOKEN}
      PCA_OBSERVABILITY_LOG_FORMAT: ${PCA_OBSERVABILITY_LOG_FORMAT}
      PCA_OBSERVABILITY_LOG_LEVEL: ${PCA_OBSERVABILITY_LOG_LEVEL}
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY:-}
      PCA_MEMORY_EMBEDDING_MODEL: ${PCA_MEMORY_EMBEDDING_MODEL:-dashscope:text-embedding-v4}
      # E2E step 43: cap active sandboxes at 1 so a second create returns 429.
      PCA_QUOTA_SANDBOX_MAX_ACTIVE: ${PCA_QUOTA_SANDBOX_MAX_ACTIVE:-1}
      PCA_AUTH_LOCAL_ENABLED: ${PCA_AUTH_LOCAL_ENABLED:-true}
      PCA_AUTH_OIDC_ENABLED: ${PCA_AUTH_OIDC_ENABLED:-true}
      PCA_AUTH_OIDC_ISSUER: ${PCA_AUTH_OIDC_ISSUER:-http://mock-oidc:8082}
      PCA_AUTH_OIDC_CLIENT_ID: ${PCA_AUTH_OIDC_CLIENT_ID:-pca-e2e}
      PCA_AUTH_OIDC_CLIENT_SECRET_ENV: OIDC_CLIENT_SECRET
      PCA_AUTH_OIDC_REDIRECT_URL: ${PCA_AUTH_OIDC_REDIRECT_URL:-http://localhost:8080/auth/oidc/callback}
      PCA_AUTH_OIDC_TENANT_SLUG: ${PCA_AUTH_OIDC_TENANT_SLUG:-default}
      OIDC_CLIENT_SECRET: ${OIDC_CLIENT_SECRET:-e2e-oidc-secret-change-me}
      # Slice 20: Reflection Agent. In E2E we point at default-mock so the
      # worker's LLM call hits the canned REFLECTION_TASK_V1 branch.
      PCA_REFLECTION_ENABLED: ${PCA_REFLECTION_ENABLED:-true}
      PCA_REFLECTION_MODEL: ${PCA_REFLECTION_MODEL:-default-mock:gpt-4o}
      # Slice 21a: orchestration router. Rules live in config.yaml (compose
      # mounts the example); only the on/off + inject toggles are env-driven.
      # E2E step 62 depends on enabled=true + inject_hint=true.
      PCA_ORCHESTRATOR_ENABLED: ${PCA_ORCHESTRATOR_ENABLED:-true}
      PCA_ORCHESTRATOR_INJECT_HINT: ${PCA_ORCHESTRATOR_INJECT_HINT:-true}
      # Slice 21b: external MCP manager. Heartbeat interval is generous in E2E
      # so a flaky mock-mcp doesn't flood last_error.
      PCA_MCP_ENABLED: ${PCA_MCP_ENABLED:-true}
      PCA_MCP_HEARTBEAT_INTERVAL: ${PCA_MCP_HEARTBEAT_INTERVAL:-60s}
      PCA_MCP_INVOKE_TIMEOUT: ${PCA_MCP_INVOKE_TIMEOUT:-30s}
      PCA_MCP_LIST_TOOLS_TIMEOUT: ${PCA_MCP_LIST_TOOLS_TIMEOUT:-10s}
      # Slice 22b: sandbox→S3 snapshot. enabled=true wires objstore at boot;
      # E2E step 65 exercises the full POST /snapshot path against this MinIO.
      PCA_SNAPSHOT_ENABLED: ${PCA_SNAPSHOT_ENABLED:-true}
      PCA_SNAPSHOT_ENDPOINT: ${PCA_SNAPSHOT_ENDPOINT:-minio:9000}
      PCA_SNAPSHOT_BUCKET: ${PCA_SNAPSHOT_BUCKET:-pca-snapshots}
      PCA_SNAPSHOT_ACCESS_KEY: ${PCA_SNAPSHOT_ACCESS_KEY:-${MINIO_ROOT_USER:-minioadmin}}
      PCA_SNAPSHOT_SECRET_KEY: ${PCA_SNAPSHOT_SECRET_KEY:-${MINIO_ROOT_PASSWORD:-minioadmin}}
      PCA_SNAPSHOT_REGION: ${PCA_SNAPSHOT_REGION:-us-east-1}
      PCA_SNAPSHOT_USE_SSL: ${PCA_SNAPSHOT_USE_SSL:-false}
      PCA_SNAPSHOT_PREFIX: ${PCA_SNAPSHOT_PREFIX:-}
      PCA_SNAPSHOT_KEEP_LOCAL_IMAGE: ${PCA_SNAPSHOT_KEEP_LOCAL_IMAGE:-false}
      # Slice 25a: server-side http.fetch (E2E hits mock-provider on the compose network).
      PCA_CONNECTORS_HTTP_FETCH_ENABLED: ${PCA_CONNECTORS_HTTP_FETCH_ENABLED:-true}
      PCA_CONNECTORS_HTTP_FETCH_ALLOW_HOSTS: ${PCA_CONNECTORS_HTTP_FETCH_ALLOW_HOSTS:-mock-provider}
      PCA_CONNECTORS_HTTP_FETCH_BLOCK_PRIVATE_IPS: ${PCA_CONNECTORS_HTTP_FETCH_BLOCK_PRIVATE_IPS:-false}
      DOCKER_HOST: "unix:///var/run/docker.sock"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "8080:8080"

volumes:
  pgdata:
  miniodata:
