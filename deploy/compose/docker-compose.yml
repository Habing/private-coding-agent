services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER}"]
      interval: 3s
      timeout: 3s
      retries: 20
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 20
    ports:
      - "6379:6379"

  # 预 build pca/sandbox:base 镜像 (server depend 起来前必须可用)
  sandbox-image-builder:
    image: docker:cli
    command: ["sh", "-c", "docker build -t pca/sandbox:base /sandbox-context || true; sleep infinity"]
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ../../sandbox/image:/sandbox-context:ro
    profiles: ["build-only"]

  mock-oidc:
    build:
      context: ../..
      dockerfile: internal/auth/mockoidc/Dockerfile
    environment:
      MOCK_OIDC_ISSUER: http://mock-oidc:8082
      MOCK_OIDC_PUBLIC_URL: http://localhost:8082
      MOCK_OIDC_CLIENT_ID: pca-e2e
      MOCK_OIDC_CLIENT_SECRET: e2e-oidc-secret-change-me
      MOCK_OIDC_PORT: "8082"
    ports:
      - "8082:8082"

  mock-provider:
    build:
      context: ../..
      dockerfile: internal/modelgw/mockserver/Dockerfile
    healthcheck:
      disable: true
    ports:
      - "8081:8081"

  jaeger:
    image: jaegertracing/all-in-one:1.55
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"  # UI
      - "4317:4317"    # OTLP gRPC

  prometheus:
    # Bake prometheus.yml into a derived image instead of using a bind mount —
    # Docker Desktop for Windows occasionally fails to share F:\ paths
    # ("mkdir /run/desktop/mnt/host/f: file exists"), which blocks compose-up.
    # The image is rebuilt automatically when prometheus.yml changes.
    build:
      context: .
      dockerfile: prometheus.Dockerfile
    image: pca/prometheus:dev
    ports:
      - "9090:9090"
    depends_on:
      - server

  server:
    build:
      context: ../..
      dockerfile: Dockerfile
    user: "0:0"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mock-oidc:
        condition: service_started
    environment:
      PCA_DB_DSN: "postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable"
      PCA_REDIS_ADDR: "redis:6379"
      PCA_SERVER_PORT: 8080
      PCA_SERVER_MODE: release
      PCA_AUTH_JWT_SECRET: ${PCA_AUTH_JWT_SECRET}
      PCA_AUTH_JWT_TTL: 24h
      PCA_TELEMETRY_SERVICE_NAME: private-coding-agent
      PCA_TELEMETRY_OTLP_ENDPOINT: ${PCA_TELEMETRY_OTLP_ENDPOINT}
      PCA_OBSERVABILITY_METRICS_TOKEN: ${PCA_OBSERVABILITY_METRICS_TOKEN}
      PCA_OBSERVABILITY_LOG_FORMAT: ${PCA_OBSERVABILITY_LOG_FORMAT}
      PCA_OBSERVABILITY_LOG_LEVEL: ${PCA_OBSERVABILITY_LOG_LEVEL}
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY:-}
      PCA_MEMORY_EMBEDDING_MODEL: ${PCA_MEMORY_EMBEDDING_MODEL:-dashscope:text-embedding-v4}
      # E2E step 43: cap active sandboxes at 1 so a second create returns 429.
      PCA_QUOTA_SANDBOX_MAX_ACTIVE: ${PCA_QUOTA_SANDBOX_MAX_ACTIVE:-1}
      PCA_AUTH_LOCAL_ENABLED: ${PCA_AUTH_LOCAL_ENABLED:-true}
      PCA_AUTH_OIDC_ENABLED: ${PCA_AUTH_OIDC_ENABLED:-true}
      PCA_AUTH_OIDC_ISSUER: ${PCA_AUTH_OIDC_ISSUER:-http://mock-oidc:8082}
      PCA_AUTH_OIDC_CLIENT_ID: ${PCA_AUTH_OIDC_CLIENT_ID:-pca-e2e}
      PCA_AUTH_OIDC_CLIENT_SECRET_ENV: OIDC_CLIENT_SECRET
      PCA_AUTH_OIDC_REDIRECT_URL: ${PCA_AUTH_OIDC_REDIRECT_URL:-http://localhost:8080/auth/oidc/callback}
      PCA_AUTH_OIDC_TENANT_SLUG: ${PCA_AUTH_OIDC_TENANT_SLUG:-default}
      OIDC_CLIENT_SECRET: ${OIDC_CLIENT_SECRET:-e2e-oidc-secret-change-me}
      DOCKER_HOST: "unix:///var/run/docker.sock"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "8080:8080"

volumes:
  pgdata:
