services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER}"]
      interval: 3s
      timeout: 3s
      retries: 20
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 20
    ports:
      - "6379:6379"

  # 预 build pca/sandbox:base 镜像 (server depend 起来前必须可用)
  sandbox-image-builder:
    image: docker:cli
    command: ["sh", "-c", "docker build -t pca/sandbox:base /sandbox-context || true; sleep infinity"]
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ../../sandbox/image:/sandbox-context:ro
    profiles: ["build-only"]

  mock-provider:
    build:
      context: ../..
      dockerfile: internal/modelgw/mockserver/Dockerfile
    healthcheck:
      disable: true
    ports:
      - "8081:8081"

  jaeger:
    image: jaegertracing/all-in-one:1.55
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"  # UI
      - "4317:4317"    # OTLP gRPC

  prometheus:
    image: prom/prometheus:v2.51.2
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    depends_on:
      - server

  server:
    build:
      context: ../..
      dockerfile: Dockerfile
    user: "0:0"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      PCA_DB_DSN: "postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable"
      PCA_REDIS_ADDR: "redis:6379"
      PCA_SERVER_PORT: 8080
      PCA_SERVER_MODE: release
      PCA_AUTH_JWT_SECRET: ${PCA_AUTH_JWT_SECRET}
      PCA_AUTH_JWT_TTL: 24h
      PCA_TELEMETRY_SERVICE_NAME: private-coding-agent
      PCA_TELEMETRY_OTLP_ENDPOINT: ${PCA_TELEMETRY_OTLP_ENDPOINT}
      PCA_OBSERVABILITY_METRICS_TOKEN: ${PCA_OBSERVABILITY_METRICS_TOKEN}
      PCA_OBSERVABILITY_LOG_FORMAT: ${PCA_OBSERVABILITY_LOG_FORMAT}
      PCA_OBSERVABILITY_LOG_LEVEL: ${PCA_OBSERVABILITY_LOG_LEVEL}
      DOCKER_HOST: "unix:///var/run/docker.sock"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "8080:8080"

volumes:
  pgdata:
