apiVersion: v1
kind: Service
metadata:
  name: {{ include "pca.serverFullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "pca.serverSelectorLabels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "pca.serverSelectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
