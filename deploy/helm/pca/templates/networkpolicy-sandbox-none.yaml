{{- if .Values.networkPolicy.enabled -}}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "pca.fullname" . }}-sandbox-none
  namespace: {{ .Values.rbac.sandboxNamespace }}
  labels:
    {{- include "pca.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      pca.network: none
  policyTypes:
    - Ingress
    - Egress
  # No ingress / egress rules -> deny-all (air-gap)
  ingress: []
  egress: []
{{- end -}}
