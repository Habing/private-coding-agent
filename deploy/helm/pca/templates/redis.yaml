{{- if .Values.redis.enabled -}}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "pca.redisFullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "pca.redisSelectorLabels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "pca.redisSelectorLabels" . | nindent 4 }}
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "pca.redisFullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "pca.redisSelectorLabels" . | nindent 4 }}
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "pca.redisSelectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "pca.redisSelectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: redis
          image: {{ .Values.redis.image | quote }}
          args: ["--save", "60", "1", "--loglevel", "warning"]
          ports:
            - containerPort: 6379
              name: redis
          volumeMounts:
            - name: data
              mountPath: /data
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 15
            periodSeconds: 10
      volumes:
        - name: data
          {{- if and .Values.redis.storage .Values.redis.storage.size }}
          persistentVolumeClaim:
            claimName: {{ include "pca.redisFullname" . }}
          {{- else }}
          emptyDir: {}
          {{- end }}
{{- if and .Values.redis.storage .Values.redis.storage.size }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "pca.redisFullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "pca.redisSelectorLabels" . | nindent 4 }}
spec:
  accessModes: ["ReadWriteOnce"]
  {{- if .Values.redis.storage.storageClassName }}
  storageClassName: {{ .Values.redis.storage.storageClassName | quote }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.redis.storage.size }}
{{- end }}
{{- end -}}
