{{- if .Values.rbac.create -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "pca.serverFullname" . }}-sandbox
  namespace: {{ .Values.rbac.sandboxNamespace }}
  labels:
    {{- include "pca.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["create", "get", "list", "delete"]
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "pca.serverFullname" . }}-sandbox
  namespace: {{ .Values.rbac.sandboxNamespace }}
  labels:
    {{- include "pca.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ include "pca.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "pca.serverFullname" . }}-sandbox
{{- end -}}
