{{- if .Values.postgres.enabled -}}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "pca.postgresFullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "pca.postgresSelectorLabels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "pca.postgresSelectorLabels" . | nindent 4 }}
  ports:
    - name: pg
      port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "pca.postgresFullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "pca.postgresSelectorLabels" . | nindent 4 }}
spec:
  serviceName: {{ include "pca.postgresFullname" . }}
  replicas: 1
  selector:
    matchLabels:
      {{- include "pca.postgresSelectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "pca.postgresSelectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: postgres
          image: {{ .Values.postgres.image | quote }}
          ports:
            - containerPort: 5432
              name: pg
          env:
            - name: POSTGRES_USER
              value: app
            - name: POSTGRES_DB
              value: app
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "pca.secretName" . }}
                  key: db_password
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "app", "-d", "app"]
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "app", "-d", "app"]
            initialDelaySeconds: 20
            periodSeconds: 10
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        {{- if .Values.postgres.storage.storageClassName }}
        storageClassName: {{ .Values.postgres.storage.storageClassName | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.postgres.storage.size }}
{{- end -}}
