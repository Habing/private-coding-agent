{{- if .Values.networkPolicy.enabled -}}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "pca.serverFullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "pca.serverSelectorLabels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "pca.serverSelectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - ports:
        - protocol: TCP
          port: {{ .Values.config.server.port }}
  egress:
    # DNS (CoreDNS / kube-dns)
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # kube-apiserver (K8sDriver pod create/get/delete/exec)
    - ports:
        - protocol: TCP
          port: 443
        - protocol: TCP
          port: 6443
    # Postgres (chart-managed)
    {{- if .Values.postgres.enabled }}
    - to:
        - podSelector:
            matchLabels:
              {{- include "pca.postgresSelectorLabels" . | nindent 14 }}
      ports:
        - protocol: TCP
          port: 5432
    {{- end }}
    # Redis (chart-managed)
    {{- if .Values.redis.enabled }}
    - to:
        - podSelector:
            matchLabels:
              {{- include "pca.redisSelectorLabels" . | nindent 14 }}
      ports:
        - protocol: TCP
          port: 6379
    {{- end }}
    # External egress for LLM provider / OIDC / MCP — disable by setting
    # networkPolicy.allowExternalEgress=false if you want strict isolation
    {{- if .Values.networkPolicy.allowExternalEgress }}
    - ports:
        - protocol: TCP
          port: 443
        - protocol: TCP
          port: 80
    {{- end }}
{{- end -}}
